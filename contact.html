<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Contact Vertex</title>

  <link rel="stylesheet" href="style.css">

  <!-- ICONS -->
  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>
<body>

<header class="navbar">

    <div class="logo">
        <img src="images/logo.png" alt="vertex logo">
    </div>

    <nav>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="men.html">Men</a></li>
            <li><a href="women.html">Women</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html" class="active">Contact</a></li>
        </ul>
    </nav>

</header>


<section class="contact-hero">

    <div class="contact-overlay"></div>

    <div class="contact-container">

        <!-- LEFT SIDE -->

        <div class="contact-info">

            <h4>GET IN TOUCH</h4>

            <h1>
                Connect With <span>Vertex</span>
            </h1>

            <p>
                Experience luxury customer service crafted
                for elite watch enthusiasts around the world.
            </p>


            <div class="social-links">

                <a href="#">
                    <i class="fab fa-instagram"></i>
                    Instagram
                </a>

                <a href="#">
                    <i class="fab fa-facebook-f"></i>
                    Facebook
                </a>

                <a href="#">
                    <i class="fab fa-x-twitter"></i>
                    X / Twitter
                </a>

                <a href="#">
                    <i class="fab fa-youtube"></i>
                    YouTube
                </a>

                <a href="#">
                    <i class="fas fa-envelope"></i>
                    support@vertex.com
                </a>

            </div>

        </div>


        <!-- RIGHT SIDE -->

        <div class="contact-form-box">
        <form action="https://formsubmit.co/nesathjayasinghe@gmail.com" method="POST">

    <input type="text"
    name="name"
    placeholder="Full Name"
    required>

    <input type="email"
    name="email"
    placeholder="Email Address"
    required>

    <select name="inquiry" required>

        <option value="">
            Select Inquiry
        </option>

        <option>
            Product Inquiry
        </option>

        <option>
            Customer Support
        </option>

        <option>
            Luxury Partnership
        </option>

    </select>

    <textarea
    name="message"
    rows="6"
    placeholder="Your Message"></textarea>

    <button type="submit">
        Send Message
    </button>

</form>
            
           

        </div>

    </div>

</section>

</body>
</html>
